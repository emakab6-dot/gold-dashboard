name: Fetch Gold OI Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch CME Gold Data
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error
          import json, time, os, re

          TS = int(time.time() * 1000)

          def get(url, headers=None, timeout=15):
            h = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'en-US,en;q=0.9',
            }
            if headers:
              h.update(headers)
            req = urllib.request.Request(url, headers=h)
            with urllib.request.urlopen(req, timeout=timeout) as r:
              return r.read().decode('utf-8', errors='replace')

          def si(v):
            try: return int(str(v).replace(',','').strip())
            except: return 0

          def sf(v):
            try: return float(str(v).replace(',','').strip())
            except: return 0.0

          result = {
            'timestamp': TS,
            'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            'price': None, 'gc_oi': None,
            'call_oi': 0, 'put_oi': 0,
            'strikes': [], 'errors': []
          }

          # ═══ 1. GC PRICE via CME v2 ═══
          print("=== 1. GC PRICE ===")
          try:
            txt = get(
              f'https://www.cmegroup.com/CmeWS/mvc/quotes/v2/437/GCM6?isProtected&_t={TS}',
              headers={'Referer': 'https://www.cmegroup.com/'}
            )
            d = json.loads(txt)
            quotes = d.get('quotes', [])
            for q in quotes:
              # notionalValue = price * 100 (100oz contract)
              nv = sf(q.get('notionalValue', 0))
              if nv > 100000:
                result['price'] = round(nv / 100, 1)
                result['gc_oi'] = si(q.get('openInterest', 0))
                print(f"Price: {result['price']}, OI: {result['gc_oi']}")
                break
              # Or direct last price
              lp = sf(q.get('last', 0))
              if 1000 < lp < 10000:
                result['price'] = lp
                result['gc_oi'] = si(q.get('openInterest', 0))
                print(f"Price (last): {result['price']}")
                break
          except Exception as e:
            print(f"CME v2 error: {e}")
            result['errors'].append(f'cme:{e}')

          # ═══ 2. STOOQ FALLBACK ═══
          if not result['price']:
            try:
              txt = get('https://stooq.com/q/l/?s=gc.f&f=sd2t2ohlcv&h&e=csv',
                       headers={'User-Agent':'Mozilla/5.0'})
              lines = txt.strip().split('\n')
              if len(lines) >= 2:
                result['price'] = float(lines[1].split(',')[6])
                print(f"Stooq price: {result['price']}")
            except Exception as e:
              result['errors'].append(f'stooq:{e}')

          SP = result['price'] or 4700
          print(f"Spot: {SP}")

          # ═══ 3. BARCHART OPTIONS OI ═══
          # Barchart a une API publique pour les options futures GC
          print("\n=== 3. BARCHART OPTIONS OI ===")
          
          # Method A: Barchart free API endpoint
          try:
            # GCM26 = Gold Jun 2026
            url = 'https://www.barchart.com/proxies/core-api/v1/options/chain?symbol=GCM26&fields=strikePrice%2CopenInterest%2Cvolume%2ClastPrice%2CbaseSymbol&groupBy=strike&raw=1'
            txt = get(url, headers={
              'Referer': 'https://www.barchart.com/futures/quotes/GCM26/options',
              'Accept': 'application/json',
            })
            d = json.loads(txt)
            rows = d.get('data', [])
            print(f"Barchart rows: {len(rows)}")
            if rows:
              print(f"First row keys: {list(rows[0].keys()) if isinstance(rows[0], dict) else type(rows[0])}")
              print(f"First row: {json.dumps(rows[0])[:300]}")
            
            call_oi = put_oi = 0
            strikes_map = {}
            for row in rows:
              k = sf(row.get('strikePrice', row.get('strike', 0)))
              if not k: continue
              # Barchart separates call/put
              sym = str(row.get('baseSymbol', row.get('symbol', '')))
              oi = si(row.get('openInterest', 0))
              vol = si(row.get('volume', 0))
              # Detect call vs put from symbol or field
              is_call = 'C' in sym.upper() or row.get('type','') == 'call'
              is_put  = 'P' in sym.upper() or row.get('type','') == 'put'
              
              if k not in strikes_map:
                strikes_map[k] = {'k':k,'coi':0,'cvol':0,'poi':0,'pvol':0}
              if is_call:
                strikes_map[k]['coi'] = oi
                strikes_map[k]['cvol'] = vol
                call_oi += oi
              elif is_put:
                strikes_map[k]['poi'] = oi
                strikes_map[k]['pvol'] = vol
                put_oi += oi
            
            if call_oi + put_oi > 0:
              result['call_oi'] = call_oi
              result['put_oi'] = put_oi
              result['strikes'] = sorted(strikes_map.values(), key=lambda x: x['k'])
              print(f"Barchart: call={call_oi} put={put_oi} strikes={len(strikes_map)}")
          except Exception as e:
            print(f"Barchart A error: {e}")
            result['errors'].append(f'barchart_a:{e}')

          # Method B: Barchart alternative endpoint
          if result['call_oi'] == 0:
            try:
              url = f'https://www.barchart.com/proxies/core-api/v1/quotes/get?symbols=GCM26C{int(SP//25*25)},GCM26P{int(SP//25*25)}&fields=openInterest,volume,lastPrice&raw=1'
              txt = get(url, headers={'Referer':'https://www.barchart.com/'})
              print(f"Barchart B: {txt[:400]}")
            except Exception as e:
              print(f"Barchart B error: {e}")

          # Method C: Yahoo Finance options (GC=F)
          if result['call_oi'] == 0:
            print("\n=== 4. YAHOO FINANCE OPTIONS ===")
            try:
              url = 'https://query2.finance.yahoo.com/v7/finance/options/GC%3DF'
              txt = get(url, headers={'Accept':'application/json'})
              d = json.loads(txt)
              chain = d.get('optionChain',{}).get('result',[{}])[0]
              opts = chain.get('options',[{}])[0]
              calls = opts.get('calls', [])
              puts  = opts.get('puts', [])
              
              print(f"Yahoo: {len(calls)} calls, {len(puts)} puts")
              if calls:
                print(f"Call[0] keys: {list(calls[0].keys())}")
                print(f"Call[0]: {json.dumps(calls[0])[:200]}")
              
              spot = chain.get('quote',{}).get('regularMarketPrice', SP)
              if spot: result['price'] = result['price'] or spot
              
              call_oi = sum(si(c.get('openInterest',0)) for c in calls)
              put_oi  = sum(si(p.get('openInterest',0)) for p in puts)
              print(f"Yahoo OI: calls={call_oi} puts={put_oi}")
              
              if call_oi + put_oi > 0:
                strikes_map = {}
                for c in calls:
                  k = sf(c.get('strike',0))
                  if not k: continue
                  if k not in strikes_map: strikes_map[k]={'k':k,'coi':0,'cvol':0,'poi':0,'pvol':0}
                  strikes_map[k]['coi'] = si(c.get('openInterest',0))
                  strikes_map[k]['cvol'] = si(c.get('volume',0))
                for p in puts:
                  k = sf(p.get('strike',0))
                  if not k: continue
                  if k not in strikes_map: strikes_map[k]={'k':k,'coi':0,'cvol':0,'poi':0,'pvol':0}
                  strikes_map[k]['poi'] = si(p.get('openInterest',0))
                  strikes_map[k]['pvol'] = si(p.get('volume',0))
                result['call_oi'] = call_oi
                result['put_oi']  = put_oi
                result['strikes'] = sorted(strikes_map.values(), key=lambda x: x['k'])
                print(f"Yahoo: call={call_oi} put={put_oi}")
            except Exception as e:
              print(f"Yahoo error: {e}")
              result['errors'].append(f'yahoo:{e}')

          # ═══ SAVE ═══
          os.makedirs('data', exist_ok=True)
          with open('data/gold.json', 'w') as f:
            json.dump(result, f, indent=2)

          print(f"\n=== FINAL ===")
          print(f"Price: {result['price']}")
          print(f"GC OI: {result['gc_oi']}")
          print(f"Call OI: {result['call_oi']}")
          print(f"Put OI: {result['put_oi']}")
          print(f"Strikes: {len(result['strikes'])}")
          print(f"Errors: {result['errors']}")
          PYEOF

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold.json
          git diff --staged --quiet || git commit -m "data: Gold OI $(date -u '+%H:%M UTC')"
          git push
