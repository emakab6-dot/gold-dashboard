name: Fetch Gold OI Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch CME Gold Data
        env:
          CME_TOKEN: ${{ secrets.CME_TOKEN }}
          CME_FGP: ${{ secrets.CME_FGP }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error
          import json, time, os

          TS = int(time.time() * 1000)
          CME_TOKEN = os.environ.get('CME_TOKEN', '')
          CME_FGP   = os.environ.get('CME_FGP', '')

          # Cookie complet reconstitué
          COOKIE = f'__Secure-Fgp={CME_FGP}; cmeToken={CME_TOKEN}'

          HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36',
            'Accept': 'application/json, text/plain, */*',
            'Accept-Language': 'en-US,en;q=0.9',
            'Referer': 'https://www.cmegroup.com/markets/metals/precious/gold.quotes.options.html',
            'Origin': 'https://www.cmegroup.com',
            'Cookie': COOKIE,
          }

          HEADERS_POST = {**HEADERS, 'Content-Type': 'application/json'}

          def get(url, timeout=15):
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=timeout) as r:
              return json.loads(r.read().decode('utf-8', errors='replace'))

          def post(url, body, timeout=15):
            data = json.dumps(body).encode('utf-8')
            req = urllib.request.Request(url, data=data, headers=HEADERS_POST, method='POST')
            with urllib.request.urlopen(req, timeout=timeout) as r:
              return json.loads(r.read().decode('utf-8', errors='replace'))

          def si(v):
            try: return int(str(v).replace(',','').strip())
            except: return 0
          def sf(v):
            try: return float(str(v).replace(',','').strip())
            except: return 0.0

          result = {
            'timestamp': TS,
            'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            'price': None, 'gc_oi': None,
            'call_oi': 0, 'put_oi': 0,
            'strikes': [], 'errors': []
          }

          has_token = bool(CME_TOKEN and len(CME_TOKEN) > 10)
          print(f"Token présent: {has_token}")

          # ═══ 1. PRIX GC ═══
          print("=== 1. PRIX ===")
          try:
            d = get(f'https://www.cmegroup.com/CmeWS/mvc/quotes/v2/437/GCM6?isProtected&_t={TS}')
            for q in d.get('quotes', []):
              lp = sf(q.get('last', 0))
              nv = sf(q.get('notionalValue', 0))
              oi = si(q.get('openInterest', 0))
              if 1000 < lp < 10000:
                result['price'] = lp
                if oi > 0: result['gc_oi'] = oi
                print(f"Price: {lp}, OI: {oi}")
                break
              elif nv > 100000:
                result['price'] = round(nv/100, 1)
                print(f"Price(nv): {result['price']}")
                break
          except Exception as e:
            print(f"CME price: {e}")
            result['errors'].append(f'price:{e}')

          if not result['price']:
            try:
              req = urllib.request.Request(
                'https://stooq.com/q/l/?s=gc.f&f=sd2t2ohlcv&h&e=csv',
                headers={'User-Agent':'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=8) as r:
                lines = r.read().decode().strip().split('\n')
                if len(lines) >= 2:
                  result['price'] = float(lines[1].split(',')[6])
                  print(f"Stooq: {result['price']}")
            except Exception as e:
              result['errors'].append(f'stooq:{e}')

          SP = result['price'] or 4700
          print(f"Spot: {SP}")

          # ═══ 2. OPTIONS via POST quotes-by-symbol (avec auth) ═══
          print("\n=== 2. OPTIONS POST ===")
          strikes_to_fetch = []
          base = int(SP / 25) * 25
          for s in range(base - 300, base + 325, 25):
            strikes_to_fetch.append(f"OGM6 C{s}")
            strikes_to_fetch.append(f"OGM6 P{s}")

          print(f"Fetching {len(strikes_to_fetch)} quotes")

          try:
            url = f'https://www.cmegroup.com/CmeWS/mvc/quotes/v2/quotes-by-symbol?isProtected&_t={TS}'
            d = post(url, strikes_to_fetch)
            print(f"POST success: {len(d) if isinstance(d, list) else type(d).__name__} items")

            if isinstance(d, list) and d:
              print(f"Item keys: {list(d[0].keys())}")
              print(f"First item: {json.dumps(d[0])[:300]}")

              call_oi = put_oi = 0
              strikes_map = {}

              for item in d:
                qc = item.get('quoteCode', item.get('escapedQuoteCode', ''))
                parts = qc.split(' ')
                if len(parts) != 2: continue
                pc   = parts[1][0]   # C or P
                try: k = float(parts[1][1:])
                except: continue

                oi   = si(item.get('openInterest', item.get('oi', 0)))
                vol  = si(item.get('volume', 0))
                last = sf(item.get('last', 0))
                bid  = sf(item.get('bid', 0))
                ask  = sf(item.get('ask', 0))

                if k not in strikes_map:
                  strikes_map[k] = {'k':k,'coi':0,'cvol':0,'poi':0,'pvol':0,'clast':0,'plast':0}

                if pc == 'C':
                  strikes_map[k]['coi']   = oi
                  strikes_map[k]['cvol']  = vol
                  strikes_map[k]['clast'] = last
                  call_oi += oi
                elif pc == 'P':
                  strikes_map[k]['poi']   = oi
                  strikes_map[k]['pvol']  = vol
                  strikes_map[k]['plast'] = last
                  put_oi += oi

              print(f"call_oi={call_oi} put_oi={put_oi} strikes={len(strikes_map)}")

              if call_oi + put_oi > 0:
                result['call_oi'] = call_oi
                result['put_oi']  = put_oi
                result['strikes'] = sorted(strikes_map.values(), key=lambda x: x['k'])
              else:
                # OI=0 mais volume présent → volume comme proxy
                total_cvol = sum(si(item.get('volume',0)) for item in d if 'C' in item.get('quoteCode',''))
                total_pvol = sum(si(item.get('volume',0)) for item in d if 'P' in item.get('quoteCode',''))
                print(f"Volume as proxy: call={total_cvol} put={total_pvol}")
                if total_cvol + total_pvol > 0:
                  # Rebuild with volume
                  for item in d:
                    qc = item.get('quoteCode','')
                    parts = qc.split(' ')
                    if len(parts) != 2: continue
                    pc = parts[1][0]
                    try: k = float(parts[1][1:])
                    except: continue
                    vol = si(item.get('volume',0))
                    if k not in strikes_map:
                      strikes_map[k] = {'k':k,'coi':0,'cvol':0,'poi':0,'pvol':0}
                    if pc == 'C':
                      strikes_map[k]['cvol'] = vol
                      call_oi += vol
                    elif pc == 'P':
                      strikes_map[k]['pvol'] = vol
                      put_oi += vol
                  result['call_oi'] = call_oi
                  result['put_oi']  = put_oi
                  result['strikes'] = sorted(strikes_map.values(), key=lambda x: x['k'])
                  result['data_type'] = 'volume_proxy'

          except urllib.error.HTTPError as e:
            print(f"POST HTTP {e.code}: {e.reason}")
            result['errors'].append(f'post:{e.code}')
          except Exception as e:
            print(f"POST error: {e}")
            result['errors'].append(f'post:{e}')

          # ═══ 3. ATM endpoint avec auth ═══
          if result['call_oi'] == 0:
            print("\n=== 3. ATM avec auth ===")
            for month in [6, 5, 7]:
              try:
                url = f'https://www.cmegroup.com/CmeWS/mvc/atm/strike-prices/192/2026/{month}/ATM?isProtected&_t={TS}'
                d = get(url)
                print(f"ATM {month}: type={type(d).__name__}, {json.dumps(d)[:400]}")
                break
              except urllib.error.HTTPError as e:
                print(f"ATM {month}: HTTP {e.code}")
              except Exception as e:
                print(f"ATM {month}: {e}")

          # ═══ SAVE ═══
          os.makedirs('data', exist_ok=True)
          with open('data/gold.json', 'w') as f:
            json.dump(result, f, indent=2)

          print(f"\n=== FINAL ===")
          print(f"Price: {result['price']}")
          print(f"GC OI: {result['gc_oi']}")
          print(f"Call OI: {result['call_oi']}")
          print(f"Put OI: {result['put_oi']}")
          print(f"Strikes: {len(result['strikes'])}")
          print(f"Errors: {result['errors']}")
          PYEOF

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold.json
          git diff --staged --quiet || git commit -m "data: Gold OI $(date -u '+%H:%M UTC')"
          git push
