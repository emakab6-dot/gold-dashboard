name: Fetch Gold OI Data

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:         # Manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch CME Gold Data
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import time
          import os

          headers = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            'Accept': 'application/json, text/plain, */*',
            'Referer': 'https://www.cmegroup.com/markets/metals/precious/gold.html',
            'Accept-Language': 'en-US,en;q=0.9',
          }

          result = {
            'timestamp': int(time.time() * 1000),
            'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            'price': None,
            'gc_oi': None,
            'mgc_oi': None,
            'call_oi': None,
            'put_oi': None,
            'strikes': [],
            'errors': []
          }

          # Fetch GC price + OI
          try:
            ts = int(time.time() * 1000)
            url = f'https://www.cmegroup.com/CmeWS/mvc/quotes/v2/437/GCM6?isProtected&_t={ts}'
            req = urllib.request.Request(url, headers=headers)
            with urllib.request.urlopen(req, timeout=10) as r:
              d = json.loads(r.read())
              quotes = d.get('quotes', d.get('data', []))
              if isinstance(quotes, list):
                for q in quotes:
                  oi_raw = str(q.get('openInterest', q.get('oi', '0'))).replace(',','')
                  price_raw = str(q.get('last', q.get('price', '0'))).replace(',','')
                  try:
                    oi = int(oi_raw)
                    price = float(price_raw)
                    if oi > 0:
                      result['gc_oi'] = oi
                      if price > 100:
                        result['price'] = price
                      break
                  except: pass
            print(f"GC: price={result['price']} OI={result['gc_oi']}")
          except Exception as e:
            result['errors'].append(f'gc: {str(e)}')
            print(f'GC error: {e}')

          # Fallback price from Stooq
          if not result['price']:
            try:
              req = urllib.request.Request(
                'https://stooq.com/q/l/?s=gc.f&f=sd2t2ohlcv&h&e=csv',
                headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=8) as r:
                txt = r.read().decode()
                lines = txt.strip().split('\n')
                if len(lines) >= 2:
                  parts = lines[1].split(',')
                  result['price'] = float(parts[6])
              print(f"Price from Stooq: {result['price']}")
            except Exception as e:
              result['errors'].append(f'price: {str(e)}')

          # Fetch options ATM
          try:
            ts = int(time.time() * 1000)
            url = f'https://www.cmegroup.com/CmeWS/mvc/atm/strike-prices/192/2026/5/ATM?isProtected&_t={ts}'
            req = urllib.request.Request(url, headers=headers)
            with urllib.request.urlopen(req, timeout=12) as r:
              d = json.loads(r.read())
              print(f"ATM keys: {list(d.keys()) if isinstance(d, dict) else type(d)}")
              
              # Try to extract call/put OI from various response structures
              items = d.get('strikes', d.get('data', d.get('quotes', [])))
              if isinstance(items, list):
                call_oi = 0
                put_oi = 0
                strikes_out = []
                for item in items:
                  strike = float(str(item.get('strikePrice', item.get('strike', 0))).replace(',','') or 0)
                  if not strike:
                    continue
                  
                  # Various field name patterns
                  c_oi = int(str(item.get('callOpenInterest', item.get('callOI', item.get('cOI', 0)))).replace(',','') or 0)
                  p_oi = int(str(item.get('putOpenInterest', item.get('putOI', item.get('pOI', 0)))).replace(',','') or 0)
                  c_vol = int(str(item.get('callVolume', item.get('cVol', 0))).replace(',','') or 0)
                  p_vol = int(str(item.get('putVolume', item.get('pVol', 0))).replace(',','') or 0)
                  
                  call_oi += c_oi
                  put_oi += p_oi
                  if strike > 0:
                    strikes_out.append({
                      'k': strike,
                      'coi': c_oi, 'cvol': c_vol,
                      'poi': p_oi, 'pvol': p_vol
                    })
                
                result['call_oi'] = call_oi
                result['put_oi'] = put_oi
                result['strikes'] = strikes_out
                print(f"ATM options: call={call_oi} put={put_oi} strikes={len(strikes_out)}")
                
                # If no OI found, save raw for debugging
                if call_oi == 0 and put_oi == 0 and items:
                  result['debug_sample'] = items[0] if items else {}
          except Exception as e:
            result['errors'].append(f'opts_atm: {str(e)}')
            print(f'ATM opts error: {e}')

          # Fallback: legacy options OI
          if not result['call_oi']:
            try:
              ts = int(time.time() * 1000)
              url = f'https://www.cmegroup.com/CmeWS/mvc/Quotes/Option/444/G/ALL?_t={ts}'
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=15) as r:
                d = json.loads(r.read())
                quotes = d.get('quotes', [])
                call_oi = 0
                put_oi = 0
                strikes_map = {}
                for q in quotes:
                  strike = float(str(q.get('strikePrice', 0)).replace(',','') or 0)
                  if not strike:
                    continue
                  oi = int(str(q.get('openInterest', '0')).replace(',','') or 0)
                  vol = int(str(q.get('volume', '0')).replace(',','') or 0)
                  bid = float(str(q.get('bid', 0)) or 0)
                  ask = float(str(q.get('ask', 0)) or 0)
                  pc = q.get('putCall', '')
                  if strike not in strikes_map:
                    strikes_map[strike] = {'k': strike, 'coi': 0, 'cvol': 0, 'poi': 0, 'pvol': 0}
                  if pc == 'C':
                    strikes_map[strike]['coi'] = oi
                    strikes_map[strike]['cvol'] = vol
                    call_oi += oi
                  elif pc == 'P':
                    strikes_map[strike]['poi'] = oi
                    strikes_map[strike]['pvol'] = vol
                    put_oi += oi
                
                result['call_oi'] = call_oi
                result['put_oi'] = put_oi
                result['strikes'] = sorted(strikes_map.values(), key=lambda x: x['k'])
                print(f"Legacy opts: call={call_oi} put={put_oi}")
            except Exception as e:
              result['errors'].append(f'opts_legacy: {str(e)}')
              print(f'Legacy opts error: {e}')

          # Save result
          os.makedirs('data', exist_ok=True)
          with open('data/gold.json', 'w') as f:
            json.dump(result, f)
          print(f"Saved: {result}")
          EOF

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold.json
          git diff --staged --quiet || git commit -m "data: Gold OI update $(date -u '+%H:%M UTC')"
          git push
