name: Fetch Gold OI Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch CME Gold Data
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error
          import json, time, os

          TS = int(time.time() * 1000)

          HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            'Accept': 'application/json, text/plain, */*',
            'Accept-Language': 'en-US,en;q=0.9',
            'Referer': 'https://www.cmegroup.com/markets/metals/precious/gold.quotes.options.html',
            'Origin': 'https://www.cmegroup.com',
            'Cache-Control': 'no-cache',
            'Pragma': 'no-cache',
            'Sec-Fetch-Dest': 'empty',
            'Sec-Fetch-Mode': 'cors',
            'Sec-Fetch-Site': 'same-origin',
          }

          def fetch(url):
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=15) as r:
              return json.loads(r.read().decode())

          def safe_int(v):
            try: return int(str(v).replace(',','').replace(' ',''))
            except: return 0

          def safe_float(v):
            try: return float(str(v).replace(',','').replace(' ',''))
            except: return 0.0

          result = {
            'timestamp': TS,
            'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            'price': None, 'gc_oi': None,
            'call_oi': 0, 'put_oi': 0,
            'strikes': [], 'errors': [], 'debug': {}
          }

          # ── 1. GC Futures price + OI ──────────────────────────────────
          # URL exacte trouvée dans Network Inspector
          for url in [
            f'https://www.cmegroup.com/CmeWS/mvc/quotes/v2/437/GCM6?isProtected&_t={TS}',
            f'https://www.cmegroup.com/CmeWS/mvc/Quotes/Future/437/G?_t={TS}',
            f'https://www.cmegroup.com/CmeWS/mvc/quotes/v2/contracts-by-number?isProtected&_t={TS}',
          ]:
            try:
              d = fetch(url)
              result['debug']['gc_keys'] = list(d.keys()) if isinstance(d, dict) else str(type(d))[:50]
              
              # Cherche price et OI dans la réponse
              raw = json.dumps(d)
              
              # Pattern 1: quotes array
              quotes = d.get('quotes', d.get('data', d.get('contracts', [])))
              if isinstance(quotes, list):
                for q in quotes:
                  oi = safe_int(q.get('openInterest', q.get('oi', 0)))
                  price = safe_float(q.get('last', q.get('price', q.get('lastPrice', 0))))
                  if price > 100:
                    result['price'] = price
                  if oi > 0:
                    result['gc_oi'] = oi
                    break

              # Pattern 2: direct fields
              if not result['price']:
                for key in ['last', 'lastPrice', 'price', 'settle', 'priorSettle']:
                  v = safe_float(d.get(key, 0))
                  if v > 100:
                    result['price'] = v
                    break

              if result['price']:
                print(f'GC: price={result["price"]} OI={result["gc_oi"]} from {url[-60:]}')
                break
            except Exception as e:
              result['errors'].append(f'gc:{e}')
              print(f'GC error {url[-40:]}: {e}')

          # ── 2. Gold price fallback (Stooq) ───────────────────────────
          if not result['price']:
            try:
              req = urllib.request.Request(
                'https://stooq.com/q/l/?s=gc.f&f=sd2t2ohlcv&h&e=csv',
                headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=8) as r:
                lines = r.read().decode().strip().split('\n')
                if len(lines) >= 2:
                  parts = lines[1].split(',')
                  result['price'] = float(parts[6])
                  print(f'Price from Stooq: {result["price"]}')
            except Exception as e:
              result['errors'].append(f'stooq:{e}')

          SP = result['price'] or 4700

          # ── 3. Options ATM — URL exacte du Network Inspector ──────────
          # CmeWS/mvc/atm/strike-prices/192/2026/5/ATM
          # product=192 (GC options), year=2026, month=5 (May expiry)
          # Essaie aussi juin (month=6)
          opt_ok = False
          for month in [5, 6, 7]:
            for url in [
              f'https://www.cmegroup.com/CmeWS/mvc/atm/strike-prices/192/2026/{month}/ATM?isProtected&_t={TS}',
              f'https://www.cmegroup.com/CmeWS/mvc/atm/strike-prices/192/2026/{month}/ALL?isProtected&_t={TS}',
            ]:
              try:
                d = fetch(url)
                result['debug'][f'atm_{month}_keys'] = list(d.keys()) if isinstance(d, dict) else str(type(d))[:80]
                result['debug'][f'atm_{month}_sample'] = json.dumps(d)[:300]
                
                # Cherche les strikes dans la réponse
                strikes_raw = None
                for key in ['strikes', 'data', 'quotes', 'strikePrices', 'items']:
                  if key in d and isinstance(d[key], list) and d[key]:
                    strikes_raw = d[key]
                    break
                
                # Si c'est directement une liste
                if isinstance(d, list) and d:
                  strikes_raw = d

                if strikes_raw:
                  call_oi = 0
                  put_oi = 0
                  out = []
                  for item in strikes_raw:
                    if not isinstance(item, dict):
                      continue
                    # Try various field names
                    k = safe_float(item.get('strikePrice', item.get('strike', item.get('k', 0))))
                    if not k: continue
                    
                    # Call OI - various patterns
                    coi = safe_int(item.get('callOpenInterest',
                          item.get('callOI', item.get('coi',
                          item.get('call', {}).get('openInterest', 0) if isinstance(item.get('call'), dict) else 0))))
                    cvol = safe_int(item.get('callVolume', item.get('cvol', 0)))
                    
                    # Put OI
                    poi = safe_int(item.get('putOpenInterest',
                          item.get('putOI', item.get('poi',
                          item.get('put', {}).get('openInterest', 0) if isinstance(item.get('put'), dict) else 0))))
                    pvol = safe_int(item.get('putVolume', item.get('pvol', 0)))
                    
                    call_oi += coi
                    put_oi += poi
                    out.append({'k': k, 'coi': coi, 'cvol': cvol, 'poi': poi, 'pvol': pvol})
                  
                  if call_oi + put_oi > 0:
                    result['call_oi'] = call_oi
                    result['put_oi'] = put_oi
                    result['strikes'] = sorted(out, key=lambda x: x['k'])
                    print(f'ATM opts month={month}: call={call_oi} put={put_oi} n={len(out)}')
                    opt_ok = True
                    break
              except Exception as e:
                result['errors'].append(f'atm_{month}:{e}')
                print(f'ATM {month} error: {e}')
            if opt_ok:
              break

          # ── 4. Options via quotes-by-symbol ──────────────────────────
          if not opt_ok:
            try:
              url = f'https://www.cmegroup.com/CmeWS/mvc/quotes/v2/quotes-by-symbol?isProtected&_t={TS}'
              d = fetch(url)
              result['debug']['qbs_keys'] = list(d.keys()) if isinstance(d, dict) else str(type(d))[:50]
              result['debug']['qbs_sample'] = json.dumps(d)[:400]
              print(f'quotes-by-symbol: {json.dumps(d)[:200]}')
            except Exception as e:
              result['errors'].append(f'qbs:{e}')

          # ── 5. Legacy OI endpoint ─────────────────────────────────────
          if not opt_ok:
            try:
              url = f'https://www.cmegroup.com/CmeWS/mvc/Quotes/Option/444/G/ALL?_t={TS}'
              d = fetch(url)
              quotes = d.get('quotes', [])
              sm = {}
              call_oi = put_oi = 0
              for q in quotes:
                k = safe_float(q.get('strikePrice', 0))
                if not k: continue
                oi = safe_int(q.get('openInterest', 0))
                vol = safe_int(q.get('volume', 0))
                pc = q.get('putCall', '')
                if k not in sm:
                  sm[k] = {'k': k, 'coi': 0, 'cvol': 0, 'poi': 0, 'pvol': 0}
                if pc == 'C':
                  sm[k]['coi'] = oi; sm[k]['cvol'] = vol; call_oi += oi
                elif pc == 'P':
                  sm[k]['poi'] = oi; sm[k]['pvol'] = vol; put_oi += oi
              if call_oi + put_oi > 0:
                result['call_oi'] = call_oi
                result['put_oi'] = put_oi
                result['strikes'] = sorted(sm.values(), key=lambda x: x['k'])
                print(f'Legacy opts: call={call_oi} put={put_oi}')
                opt_ok = True
            except Exception as e:
              result['errors'].append(f'legacy:{e}')
              print(f'Legacy opts error: {e}')

          # Save
          os.makedirs('data', exist_ok=True)
          with open('data/gold.json', 'w') as f:
            json.dump(result, f, indent=2)
          
          print(f'\n=== RESULT ===')
          print(f'Price: {result["price"]}')
          print(f'GC OI: {result["gc_oi"]}')
          print(f'Call OI: {result["call_oi"]}')
          print(f'Put OI: {result["put_oi"]}')
          print(f'Strikes: {len(result["strikes"])}')
          print(f'Errors: {result["errors"]}')
          PYEOF

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold.json
          git diff --staged --quiet || git commit -m "data: Gold OI $(date -u '+%H:%M UTC')"
          git push
